kind = "web"
previewPath = "/"
title = "Painted Rock Enterprises"
version = "1.0.0"
id = "artifacts/pre-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18621
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/pre-website run dev"

[services.env]
PORT = "18621"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pre-website", "run", "build"]
publicDir = "artifacts/pre-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
